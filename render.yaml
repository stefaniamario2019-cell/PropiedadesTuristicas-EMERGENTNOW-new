services:
  - type: web
    name: propiedades-rd-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false  # set in Render dashboard (MongoDB Atlas connection string)
      - key: DB_NAME
        value: propiedades_rd
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false  # set in Render dashboard, e.g. https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: "3.11"
